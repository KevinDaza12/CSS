<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color: #8cc20d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 3rem;
            text-align: center;
            margin: 50px auto;
            text-transform: uppercase;
            letter-spacing: 4px;
            background-color: #f0f8ff; 
            text-decoration: none;
            border-bottom: 4px solid #8cc20d;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 80%;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        h1:hover {
            transform: scale(1.02);
        }

        h2 {
            color: #043eff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2.5rem;
            text-align: center;
            margin: 50px auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: #fff2cc; 
            text-decoration: none;
            border-left: 8px solid #043eff;
            border-right: 8px solid #043eff;
            padding: 15px 30px;
            max-width: 75%;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(4, 62, 255, 0.1);
        }

        h3 {
            color: #ff0404;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2rem;
            text-align: center;
            margin: 50px auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #ffe6e6; 
            text-decoration: none;
            padding: 12px;
            border: 2px dashed #ff0404;
            outline: 4px solid #ffe6e6;
            max-width: 60%;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>estilos para h1</h1>
    <h2>estilos para h2</h2>
    <h3>estilos para h3</h3>
</body>
</html>
